# ───────────────────────────────────────────────────────────────────────────
#  AI Community (skills-community Next.js app) — mounted under /ai-community
#  on the EXISTING ai4news.rnd.huawei.com server block. The 正统域名 is unchanged;
#  this only adds a new subpath alongside ai4news / cari_dste.
#
#  Paste the two blocks below ABOVE the catch-all `location /` in that server { }.
#  Then:  nginx -t && nginx -s reload
#
#  CRITICAL: NO trailing slash on proxy_pass. The /ai-community/ prefix MUST reach
#  Next.js intact — it is the app's basePath (NEXT_BASE_PATH=/ai-community). This is
#  the opposite of /cari_dste/, which uses a trailing slash to STRIP its prefix.
# ───────────────────────────────────────────────────────────────────────────

# `^~` = if this prefix is the longest match, DON'T fall through to any regex
# `location ~* \.(js|css|png|…)$` block the ai4news server may already have — those
# would otherwise hijack /ai-community/_next/static/*.js and break the app's assets.
location ^~ /ai-community/ {
    proxy_pass         http://127.0.0.1:3100;   # app upstream port — NO trailing slash; must match `pnpm start -- -p`
    proxy_http_version 1.1;

    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto https;            # app trusts this for absolute/callback URLs

    proxy_set_header   Upgrade           $http_upgrade;    # Next.js streaming / HMR websocket
    proxy_set_header   Connection        "upgrade";

    proxy_read_timeout 300s;                               # long SSE / LLM streaming responses
    client_max_body_size 64m;                              # avatar + video-board uploads (raise if 413 on large videos)
}

# Bare path → trailing-slash form (so /ai-community redirects into the app root).
location = /ai-community { return 301 /ai-community/; }
