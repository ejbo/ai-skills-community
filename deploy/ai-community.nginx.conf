# ───────────────────────────────────────────────────────────────────────────
#  AI Community (skills-community Next.js app) — mounted under /ai-community
#  on the EXISTING ai4news.rnd.huawei.com server block. The 正统域名 is unchanged;
#  this only adds a new subpath alongside ai4news / cari_dste.
#
#  Paste the two blocks below ABOVE the catch-all `location /` in that server { }.
#  Then:  nginx -t && nginx -s reload
#
#  CRITICAL: NO trailing slash on proxy_pass. The /ai-community/ prefix MUST reach
#  Next.js intact — it is the app's basePath (NEXT_BASE_PATH=/ai-community). This is
#  the opposite of /cari_dste/, which uses a trailing slash to STRIP its prefix.
# ───────────────────────────────────────────────────────────────────────────

# `^~` = if this prefix is the longest match, DON'T fall through to any regex
# `location ~* \.(js|css|png|…)$` block the ai4news server may already have — those
# would otherwise hijack /ai-community/_next/static/*.js and break the app's assets.
location ^~ /ai-community/ {
    proxy_pass         http://127.0.0.1:3100;   # app upstream port — NO trailing slash; must match `pnpm start -- -p`
    proxy_http_version 1.1;

    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto https;            # app trusts this for absolute/callback URLs

    proxy_set_header   Upgrade           $http_upgrade;    # Next.js streaming / HMR websocket
    proxy_set_header   Connection        "upgrade";

    proxy_read_timeout 300s;                               # long SSE / LLM streaming responses
    proxy_send_timeout 300s;                               # slow clients pushing large video uploads
    client_max_body_size 5g;                               # match the app's 5 GB video cap (was 64m → 413 on large uploads)
    proxy_request_buffering off;                           # stream big uploads to the app, don't buffer the whole file to a temp dir first
    proxy_buffering        off;                            # don't spool streamed responses (SSE/LLM) to proxy_temp on disk
    proxy_max_temp_file_size 0;
}

# Internal video byte-server (kernel sendfile), paired with the app's
# X-Accel-Redirect (set VIDEO_X_ACCEL_REDIRECT=true). The app does auth() then
# returns `X-Accel-Redirect: /_video/<key>`; nginx serves the file directly from
# disk — Node leaves the byte path entirely, so concurrent viewers/seeks scale on
# nginx, not the single JS thread. `internal` = not reachable from the browser.
#   alias MUST be <WorkingDirectory>/<LOCAL_STORAGE_DIR>/videos/  (note trailing slash).
#   The nginx worker user must be able to READ files written by User=ai4news
#   (same group + 0644 files, and o+x on the dirs) — the usual gotcha.
location /_video/ {
    internal;
    alias /opt/cari_projects/ai-skills-community/storage/videos/;
    sendfile           on;
    tcp_nopush         on;
    aio                threads;
    open_file_cache          max=2000 inactive=60s;        # reuse fds/stat for hot files under load
    open_file_cache_valid    60s;
    open_file_cache_min_uses  1;
    open_file_cache_errors   on;
    add_header Cache-Control 'private, max-age=31536000, immutable' always;
    add_header Accept-Ranges bytes always;
}

# Bare /ai-community → PROXY to the app (do NOT 301 it to /ai-community/).
# Next serves the basePath root WITHOUT a trailing slash and 308-redirects
# /ai-community/ → /ai-community; a `return 301 /ai-community/` here fights that and
# causes an infinite redirect loop ("redirected you too many times"). Proxying the bare
# path lets Next own canonicalization: /ai-community/ → (one 308) → /ai-community → 200.
location = /ai-community {
    proxy_pass         http://127.0.0.1:3100;   # NO trailing slash
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto https;
}
